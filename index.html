<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChronoChroma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #080808;
      color: #d4c9b0;
      font-family: 'Montserrat', sans-serif;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 100;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.4rem 4rem;
      border-bottom: 1px solid rgba(212, 201, 176, 0.1);
    }

    .logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .logo .chrono {
      color: #3a3a3a;
    }

    .logo .chroma {
      color: #3a3a3a;
    }


    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 4rem 4rem;
    }

.video-container {
      width: 100%;
      max-width: 1100px;
      position: relative;
    }

    /* Thin amber border lines */
    .video-container::before,
    .video-container::after {
      content: '';
      position: absolute;
      background: rgba(212, 201, 176, 0.2);
    }

    .video-container::before {
      top: -12px;
      left: 0;
      right: 0;
      height: 1px;
    }

    .video-container::after {
      bottom: -12px;
      left: 0;
      right: 0;
      height: 1px;
    }

    .video-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 2rem;
      width: 100%;
      max-width: 1100px;
    }

    .meta-line {
      flex: 1;
      height: 1px;
      background: rgba(212, 201, 176, 0.08);
    }

    .meta-text {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(212, 201, 176, 0.3);
      white-space: nowrap;
    }

    footer {
      text-align: center;
      padding: 3rem 4rem;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212, 201, 176, 0.2);
      border-top: 1px solid rgba(212, 201, 176, 0.06);
      margin-top: 4rem;
    }

    @media (max-width: 640px) {
      header {
        padding: 1.8rem 1.5rem;
        flex-direction: column;
        gap: 1.5rem;
        align-items: flex-start;
      }

      main {
        padding: 3rem 1.5rem 2rem;
      }

      nav {
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="#"><span class="chrono">Chrono</span><span class="chroma">Chroma</span></a>
  </header>

  <main>
    <div class="video-container">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/qNJJxU45P1A?rel=0&modestbranding=1&color=white"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <div class="meta">
      <div class="meta-line"></div>
      <span class="meta-text">ChronoChroma &mdash; All Rights Reserved</span>
      <div class="meta-line"></div>
    </div>
  </main>

  <footer>
    &copy; 2024 ChronoChroma &mdash; Film Direction &amp; Visual Storytelling
  </footer>

</body>
</html>
